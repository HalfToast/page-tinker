<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b9bff"/>
      <stop offset="1" stop-color="#2f6fe0"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Page -->
  <rect x="26" y="20" width="56" height="88" rx="7" fill="#ffffff"/>
  <!-- Text lines -->
  <rect x="36" y="36" width="36" height="6" rx="3" fill="#c9d6ef"/>
  <rect x="36" y="50" width="36" height="6" rx="3" fill="#c9d6ef"/>
  <rect x="36" y="64" width="24" height="6" rx="3" fill="#c9d6ef"/>

  <!-- Edit pencil crossing the page -->
  <g transform="rotate(40 92 84)">
    <rect x="83" y="36" width="18" height="8" rx="2" fill="#ff6b6b"/>
    <rect x="83" y="44" width="18" height="62" fill="#f7b500"/>
    <polygon points="83,106 101,106 92,124" fill="#ffd86b"/>
    <polygon points="88,115 96,115 92,124" fill="#1f2430"/>
  </g>
</svg>
